name: python-application

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas con pytest
        run: pytest test_app.py -v

      - name: Ejecutar la aplicación
        run: |
          python app.py &
          sleep 4
          curl -f http://localhost:5000/
          kill %1

      - name: Construir imagen Docker
        run: docker build -t ghcr.io/andernarvaez05/ejercicio:3.0.0 .

      - name: Login en GitHub Container Registry
        run: echo "${{ secrets.token_wr }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Publicar imagen
        run: docker push ghcr.io/andernarvaez05/ejercicio:3.0.0
